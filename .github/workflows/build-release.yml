name: Build and Release
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
    build:
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          include:
            - os: ubuntu-latest
              app_name: EmailReader-linux
              add_data: "assets:assets"
              artifact_path: "dist/EmailReader-linux"
            - os: macos-latest
              app_name: EmailReader-macos
              add_data: "assets:assets"
              artifact_path: "dist/EmailReader-macos"
            - os: windows-latest
              app_name: EmailReader-windows
              add_data: "assets;assets"
              artifact_path: "dist/EmailReader-windows.exe"
      permissions:
          contents: read
      steps:
          - name: Checkout code
            uses: actions/checkout@v6

          - name: Set up uv
            uses: astral-sh/setup-uv@v7

          - name: Set up Python
            uses: actions/setup-python@v6
            with:
              python-version: "3.14"

          - name: Install dependencies from lockfile
            run: |
              uv sync --frozen

          - name: Build package
            run: >
              uv run pyinstaller --onefile --clean 
              --noconfirm -w --name "${{ matrix.app_name }}" 
              --add-data "${{ matrix.add_data }}" main.py

          - name: Upload Artifact
            uses: actions/upload-artifact@v4
            with:
              name: ${{ matrix.app_name }}
              path: ${{ matrix.artifact_path }}

    release:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
          - name: Download Artifact
            uses: actions/download-artifact@v4
            with:
              pattern: "EmailReader-*"
              merge-multiple: 'true'
              path: release-assets
          - name: Create Release and Upload Assets
            id: create_release
            uses: softprops/action-gh-release@v2
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            with:
              tag_name: ${{ github.ref_name }}
              name: Email Reader ${{ github.ref_name }}
              draft: false
              prerelease: false
              files: release-assets/*